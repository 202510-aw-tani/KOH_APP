<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KOH | 予約一覧</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>
<body>
  <main class="reserve-main">
    <section class="reserve-section container">
      <h1 class="reserve-title">予約一覧</h1>
      <p class="reserve-lead">新しい予約から順に表示しています。</p>

      <div class="reservation-table-wrap">
      <table class="reservation-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>予約日</th>
            <th>時間</th>
            <th>人数</th>
            <th>名前</th>
            <th>メール</th>
            <th>電話</th>
            <th>登録日時</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(reservations)}">
            <td class="reservation-table__empty" colspan="8">予約データはありません。</td>
          </tr>
          <tr th:each="reservation : ${reservations}">
            <td th:text="${reservation.id}"></td>
            <td th:text="${#temporals.format(reservation.reservationDate, 'yyyy/MM/dd')}"></td>
            <td th:switch="${reservation.reservationTime}">
              <span th:case="'11'">11:00</span>
              <span th:case="'13'">13:00</span>
              <span th:case="'15'">15:00</span>
              <span th:case="*" th:text="${reservation.reservationTime}"></span>
            </td>
            <td th:text="${reservation.partySize}"></td>
            <td th:text="${reservation.name}"></td>
            <td th:text="${reservation.email}"></td>
            <td th:text="${reservation.phone}"></td>
            <td th:text="${#temporals.format(reservation.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
          </tr>
        </tbody>
      </table>
      </div>

      <p>
        <a th:href="@{/reserve}" href="/reserve">予約フォームに戻る</a>
      </p>
    </section>
  </main>
</body>
</html>
