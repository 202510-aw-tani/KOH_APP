<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KOH | 予約フォーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@300;400;700&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css">
</head>

<body class="reserve-page">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="logo" th:href="@{/}" href="/" aria-label="KOH ホーム">
        <img class="logo__image" th:src="@{/assets/images/common/koh-logo-new.png}" src="/assets/images/common/koh-logo-new.png" alt="KOH">
      </a>
      <nav class="site-header__nav" aria-label="グローバルナビゲーション">
        <a class="nav-link" th:href="@{/faq}" href="/faq">FAQ（よくあるご質問）</a>
        <a class="nav-link nav-link--cta" th:href="@{/}" href="/">TOPへ戻る</a>
      </nav>
    </div>
  </header>

  <main class="reserve-main">
    <section class="reserve-section container">
      <h1 class="reserve-title">予約フォーム</h1>
      <p class="reserve-lead">ご希望内容をご入力ください。送信後、完了ページへ移動します。</p>

      <form class="reserve-form" th:action="@{/reserve}" th:object="${reservationForm}" method="post">
        <p class="reserve-form__error-summary" th:if="${#fields.hasAnyErrors()}">入力内容をご確認ください。</p>
        <div class="reserve-field">
          <label for="reservation_date">予約希望日</label>
          <select id="reservation_date" th:field="*{reservationDate}" required>
            <option value="">選択してください</option>
            <option value="2026-04-05">4月5日（土）</option>
            <option value="2026-04-06">4月6日（日）</option>
            <option value="2026-04-12">4月12日（土）</option>
            <option value="2026-04-13">4月13日（日）</option>
            <option value="2026-05-02">5月2日（土）</option>
            <option value="2026-05-03">5月3日（日）</option>
            <option value="2026-05-04">5月4日（月）</option>
            <option value="2026-05-05">5月5日（火）</option>
            <option value="2026-05-06">5月6日（水）</option>
            <option value="2026-05-09">5月9日（土）</option>
            <option value="2026-05-10">5月10日（日）</option>
            <option value="2026-06-06">6月6日（土）</option>
            <option value="2026-06-07">6月7日（日）</option>
          </select>
          <p class="reserve-field__error" th:if="${#fields.hasErrors('reservationDate')}" th:errors="*{reservationDate}"></p>
        </div>

        <div class="reserve-field">
          <label for="reservation_time">時間枠</label>
          <select id="reservation_time" th:field="*{reservationTime}" required>
            <option value="">選択してください</option>
            <option value="11">11:00</option>
            <option value="13">13:00</option>
            <option value="15">15:00</option>
          </select>
          <p class="reserve-field__error" th:if="${#fields.hasErrors('reservationTime')}" th:errors="*{reservationTime}"></p>
        </div>

        <div class="reserve-field">
          <label for="party_size">人数</label>
          <select id="party_size" th:field="*{partySize}" required>
            <option value="">選択してください</option>
            <option value="1">1名</option>
            <option value="2">2名</option>
            <option value="3">3名</option>
            <option value="4">4名</option>
            <option value="5">5名</option>
            <option value="6">6名</option>
            <option value="7">7名</option>
            <option value="8">8名</option>
            <option value="9">9名</option>
            <option value="10">10名</option>
          </select>
          <p class="reserve-field__error" th:if="${#fields.hasErrors('partySize')}" th:errors="*{partySize}"></p>
        </div>

        <div class="reserve-field">
          <label for="name">名前</label>
          <input id="name" th:field="*{name}" type="text" autocomplete="name" required>
          <p class="reserve-field__error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>

        <div class="reserve-field">
          <label for="email">メールアドレス</label>
          <input id="email" th:field="*{email}" type="email" autocomplete="email" required>
          <p class="reserve-field__error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>

        <div class="reserve-field">
          <label for="phone">電話番号</label>
          <input id="phone" th:field="*{phone}" type="tel" autocomplete="tel" required>
          <p class="reserve-field__error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
        </div>

        <div class="reserve-field">
          <label for="note">備考欄</label>
          <textarea id="note" th:field="*{note}" rows="4"></textarea>
        </div>

        <div class="reserve-actions">
          <button class="btn btn--primary" type="submit">予約内容を送信する</button>
          <a class="reserve-back-link" th:href="@{/faq}" href="/faq">FAQを確認する</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <a class="logo" th:href="@{/}" href="/" aria-label="KOH ホーム">
        <img class="logo__image" th:src="@{/assets/images/common/koh-logo-new.png}" src="/assets/images/common/koh-logo-new.png" alt="KOH">
      </a>
      <nav class="site-footer__nav" aria-label="フッターナビゲーション">
        <a class="nav-link" th:href="@{/faq}" href="/faq">FAQ（よくあるご質問）</a>
        <a class="nav-link nav-link--cta" th:href="@{/reserve}" href="/reserve">ご予約はこちら</a>
      </nav>
      <small class="site-footer__copyright">©KOH</small>
    </div>
  </footer>
</body>

</html>
